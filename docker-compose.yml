services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: carditrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carditrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: src/Presentation/CardiTrack.API/Dockerfile.migrate
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=carditrack;Username=postgres;Password=postgres"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: src/Presentation/CardiTrack.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=carditrack;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
    ports:
      - "8080:8080"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    profiles: ["full"]

  worker:
    build:
      context: .
      dockerfile: src/Worker/CardiTrack.Worker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=carditrack;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    profiles: ["full"]
