services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: carditrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carditrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: src/Presentation/CardiTrack.API/Dockerfile.migrate
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=carditrack;Username=postgres;Password=postgres"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_VULKAN=1
    devices:
      - /dev/dxg:/dev/dxg
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    profiles: ["full"]

  medgemma-init:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c", "OLLAMA_HOST=http://ollama:11434 ollama pull hf.co/unsloth/medgemma-1.5-4b-it-GGUF:Q4_K_M"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    profiles: ["full"]

  api:
    build:
      context: .
      dockerfile: src/Presentation/CardiTrack.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=carditrack;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      AI__GeneralProvider: "Gemini"
      AI__MedicalProvider: "MedGemma"
      AI__Providers__0__Name: "MedGemma"
      AI__Providers__0__BaseUrl: "http://host.docker.internal:11434"
      AI__Providers__0__Model: "hf.co/unsloth/medgemma-1.5-4b-it-GGUF:Q4_K_M"
      AI__Providers__0__TimeoutSeconds: "120"
      AI__Providers__1__Name: "Gemini"
      AI__Providers__1__BaseUrl: "https://generativelanguage.googleapis.com"
      AI__Providers__1__Model: "gemini-2.0-flash"
      AI__Providers__1__ApiKey: ""
    ports:
      - "8080:8080"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    profiles: ["full"]

  worker:
    build:
      context: .
      dockerfile: src/Worker/CardiTrack.Worker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=carditrack;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    profiles: ["full"]

volumes:
  ollama_data:
