name: Deploy Infrastructure → Dev

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'infrastructure/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev]
        default: dev
      force_apply:
        description: 'Apply even if plan shows no changes'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Shared config ────────────────────────────────────────────────────────────
  env:
    uses: ./.github/workflows/_env.yml

  validate:
    name: Validate
    needs: env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ needs.env.outputs.tf_version }}
      - name: terraform fmt
        working-directory: ${{ needs.env.outputs.tf_working_dir }}
        run: terraform fmt -check -recursive
      - name: terraform init (no backend)
        working-directory: ${{ needs.env.outputs.tf_working_dir }}
        run: terraform init -backend=false
      - name: terraform validate
        working-directory: ${{ needs.env.outputs.tf_working_dir }}
        run: terraform validate

  bootstrap-state-bucket:
    name: Bootstrap State Bucket
    needs: [env, validate]
    runs-on: ubuntu-latest
    outputs:
      bucket: ${{ steps.ensure.outputs.bucket }}
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.env.outputs.gcp_wif_provider }}
          service_account: ${{ needs.env.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Ensure state bucket exists
        id: ensure
        env:
          BUCKET: ${{ needs.env.outputs.tf_state_bucket_dev }}
          PROJECT: ${{ needs.env.outputs.gcp_project_id }}
          REGION: ${{ needs.env.outputs.gcp_region }}
        run: |
          if gcloud storage buckets describe gs://$BUCKET --project=$PROJECT > /dev/null 2>&1; then
            echo "Bucket gs://$BUCKET already exists"
          else
            echo "Bucket gs://$BUCKET not found — creating..."
            gcloud storage buckets create gs://$BUCKET \
              --project=$PROJECT \
              --location=$REGION \
              --uniform-bucket-level-access
            gcloud storage buckets update gs://$BUCKET --versioning
            echo "Bucket gs://$BUCKET created with versioning enabled"
          fi
          echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT

  plan-dev:
    name: Plan (Dev)
    needs: [env, validate, bootstrap-state-bucket]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.env.outputs.gcp_wif_provider }}
          service_account: ${{ needs.env.outputs.gcp_service_account }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ needs.env.outputs.tf_version }}
      - name: terraform init
        working-directory: ${{ needs.env.outputs.tf_working_dir }}
        run: |
          terraform init \
            -backend-config="bucket=${{ needs.env.outputs.tf_state_bucket_dev }}" \
            -backend-config="prefix=carditrack/dev"
      - name: terraform plan
        id: plan
        working-directory: ${{ needs.env.outputs.tf_working_dir }}
        run: |
          set +e
          terraform plan \
            -var-file=environments/dev.tfvars \
            -out=dev.tfplan \
            -detailed-exitcode \
            -no-color 2>&1 | tee plan.txt
          TF_EXIT=${PIPESTATUS[0]}
          set -e
          echo "exitcode=${TF_EXIT}" >> $GITHUB_OUTPUT
          exit ${TF_EXIT}
        continue-on-error: true
      - name: Save plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: dev-tfplan
          path: ${{ needs.env.outputs.tf_working_dir }}/dev.tfplan
          retention-days: 1
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ needs.env.outputs.tf_working_dir }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n\n... (truncated)' : plan;
            const body = `### Terraform Plan — Dev\n\`\`\`hcl\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  apply-dev:
    name: Apply (Dev)
    needs: [env, plan-dev]
    if: |
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      (needs.plan-dev.outputs.exitcode == '2' || inputs.force_apply == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.env.outputs.gcp_wif_provider }}
          service_account: ${{ needs.env.outputs.gcp_service_account }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ needs.env.outputs.tf_version }}
      - name: terraform init
        working-directory: ${{ needs.env.outputs.tf_working_dir }}
        run: |
          terraform init \
            -backend-config="bucket=${{ needs.env.outputs.tf_state_bucket_dev }}" \
            -backend-config="prefix=carditrack/dev"
      - uses: actions/download-artifact@v4
        with:
          name: dev-tfplan
          path: ${{ needs.env.outputs.tf_working_dir }}
      - name: terraform apply
        working-directory: ${{ needs.env.outputs.tf_working_dir }}
        run: terraform apply dev.tfplan
      - name: Output summary
        working-directory: ${{ needs.env.outputs.tf_working_dir }}
        run: |
          echo "### Terraform Applied — Dev" >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY
