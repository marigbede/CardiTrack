name: CI / Deploy Apps → Dev

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      api:
        description: 'API'
        type: boolean
        default: true
      web:
        description: 'Web'
        type: boolean
        default: true
      worker:
        description: 'Worker'
        type: boolean
        default: true
      mobile:
        description: 'Mobile'
        type: boolean
        default: true
      medgemma:
        description: 'MedGemma'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Shared config (single source of truth via _env.yml) ─────────────────────
  env:
    uses: ./.github/workflows/_env.yml

  # ── Detect changed paths ─────────────────────────────────────────────────────
  # Also passes env outputs through so all downstream jobs get them
  # via needs.changes.outputs.* without needing an explicit env dependency.
  changes:
    name: Detect changes
    needs: env
    runs-on: ubuntu-latest
    outputs:
      api:            ${{ steps.manual.outputs.api      || steps.filter.outputs.api }}
      web:            ${{ steps.manual.outputs.web      || steps.filter.outputs.web }}
      worker:         ${{ steps.manual.outputs.worker   || steps.filter.outputs.worker }}
      mobile:         ${{ steps.manual.outputs.mobile   || steps.filter.outputs.mobile }}
      medgemma:       ${{ steps.manual.outputs.medgemma || steps.filter.outputs.medgemma }}
      dotnet_version:      ${{ needs.env.outputs.dotnet_version }}
      registry:            ${{ needs.env.outputs.registry }}
      gcp_project_id:      ${{ needs.env.outputs.gcp_project_id }}
      gcp_region:          ${{ needs.env.outputs.gcp_region }}
      gcp_wif_provider:    ${{ needs.env.outputs.gcp_wif_provider }}
      gcp_service_account: ${{ needs.env.outputs.gcp_service_account }}
      gcs_builds_bucket:   ${{ needs.env.outputs.gcs_builds_bucket }}
      api_url_dev:         ${{ needs.env.outputs.api_url_dev }}
    steps:
      - uses: actions/checkout@v6
      - name: Set components for manual run
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: |
          echo "api=${{ inputs.api }}"           >> $GITHUB_OUTPUT
          echo "web=${{ inputs.web }}"           >> $GITHUB_OUTPUT
          echo "worker=${{ inputs.worker }}"     >> $GITHUB_OUTPUT
          echo "mobile=${{ inputs.mobile }}"     >> $GITHUB_OUTPUT
          echo "medgemma=${{ inputs.medgemma }}" >> $GITHUB_OUTPUT
      - uses: dorny/paths-filter@v4
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            api:
              - '.github/workflows/deploy-apps-dev.yml'
              - '.github/workflows/deploy-apps-prod.yml'
              - 'src/Presentation/CardiTrack.API/**'
              - 'src/Core/**'
              - 'src/Infrastructure/**'
              - 'tests/**'
              - 'CardiTrack.sln'
            web:
              - '.github/workflows/deploy-apps-dev.yml'
              - '.github/workflows/deploy-apps-prod.yml'
              - 'src/Presentation/CardiTrack.Web/**'
              - 'src/Core/**'
              - 'src/Infrastructure/**'
              - 'CardiTrack.sln'
            worker:
              - '.github/workflows/deploy-apps-dev.yml'
              - '.github/workflows/deploy-apps-prod.yml'
              - 'src/Worker/**'
              - 'src/Core/**'
              - 'src/Infrastructure/**'
              - 'tests/**'
              - 'CardiTrack.sln'
            mobile:
              - '.github/workflows/deploy-apps-dev.yml'
              - '.github/workflows/deploy-apps-prod.yml'
              - 'src/Presentation/CardiTrack.Mobile/**'
              - 'src/Core/CardiTrack.Domain/**'
              - 'src/Core/CardiTrack.Application/**'
              - 'CardiTrack.sln'
            medgemma:
              - 'src/Infrastructure/MedGemma/**'

  # ── Compute next semver (main only) ─────────────────────────────────────────
  compute-version:
    name: Compute next version
    needs: changes
    if: |
      github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.changes.outputs.api    == 'true' ||
       needs.changes.outputs.web    == 'true' ||
       needs.changes.outputs.worker == 'true' ||
       needs.changes.outputs.mobile == 'true')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute patch bump
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-version:refname | grep '^v[0-9]' | head -1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
          MAJOR=$(echo ${LATEST#v} | cut -d. -f1)
          MINOR=$(echo ${LATEST#v} | cut -d. -f2)
          PATCH=$(echo ${LATEST#v} | cut -d. -f3)
          NEXT="v${MAJOR}.${MINOR}.$((PATCH+1))"
          echo "version=${NEXT}" >> $GITHUB_OUTPUT
          echo "Next version: ${NEXT}"

  # ── API ─────────────────────────────────────────────────────────────────────
  build-api:
    name: Build API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - run: dotnet restore src/Presentation/CardiTrack.API/CardiTrack.API.csproj
      - run: dotnet build src/Presentation/CardiTrack.API/CardiTrack.API.csproj -c Release --no-restore

  test-unit:
    name: Unit Tests
    needs: [changes, build-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - run: dotnet restore tests/CardiTrack.UnitTests/CardiTrack.UnitTests.csproj
      - run: |
          dotnet test tests/CardiTrack.UnitTests/CardiTrack.UnitTests.csproj \
            -c Release \
            --logger trx \
            --collect:"XPlat Code Coverage"
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results
          path: '**/*.trx'
          retention-days: 7

  test-integration:
    name: Integration Tests
    needs: [changes, build-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - run: dotnet restore tests/CardiTrack.IntegrationTests/CardiTrack.IntegrationTests.csproj
      - run: |
          dotnet test tests/CardiTrack.IntegrationTests/CardiTrack.IntegrationTests.csproj \
            -c Release \
            --logger trx
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-results
          path: '**/*.trx'
          retention-days: 7

  check-migrations:
    name: EF Migration Check
    needs: [changes, build-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - run: dotnet tool install --global dotnet-ef
      - run: dotnet restore src/Presentation/CardiTrack.API/CardiTrack.API.csproj
      - run: dotnet build src/Presentation/CardiTrack.API/CardiTrack.API.csproj -c Release --no-restore
      - name: Check for pending model changes
        run: |
          dotnet ef migrations has-pending-model-changes \
            --project src/Infrastructure/CardiTrack.Infrastructure/CardiTrack.Infrastructure.csproj \
            --startup-project src/Presentation/CardiTrack.API/CardiTrack.API.csproj \
            --configuration Release \
            --no-build
        env:
          SKIP_DB_CONTEXT_VALIDATION: 'true'

  security-api:
    name: Security Scan (API)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - name: Dependency vulnerability audit
        run: |
          dotnet restore src/Presentation/CardiTrack.API/CardiTrack.API.csproj
          dotnet list src/Presentation/CardiTrack.API/CardiTrack.API.csproj package \
            --vulnerable --include-transitive 2>&1 | tee audit.txt
          if grep -E "^\s+> " audit.txt | grep -qv "GHSA-rvv3-g6hj-g44x"; then
            echo "::error::Vulnerable packages detected — review audit.txt"
            exit 1
          fi

  # ── Web ─────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - run: dotnet restore src/Presentation/CardiTrack.Web/CardiTrack.Web.csproj
      - run: dotnet build src/Presentation/CardiTrack.Web/CardiTrack.Web.csproj -c Release --no-restore

  security-web:
    name: Security Scan (Web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - name: Dependency vulnerability audit
        run: |
          dotnet restore src/Presentation/CardiTrack.Web/CardiTrack.Web.csproj
          dotnet list src/Presentation/CardiTrack.Web/CardiTrack.Web.csproj package \
            --vulnerable --include-transitive 2>&1 | tee audit.txt
          if grep -E "^\s+> " audit.txt | grep -qv "GHSA-rvv3-g6hj-g44x"; then
            echo "::error::Vulnerable packages detected — review audit.txt"
            exit 1
          fi

  # ── Worker ───────────────────────────────────────────────────────────────────
  build-worker:
    name: Build Worker
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - run: dotnet restore src/Worker/CardiTrack.Worker/CardiTrack.Worker.csproj
      - run: dotnet build src/Worker/CardiTrack.Worker/CardiTrack.Worker.csproj -c Release --no-restore

  test-unit-worker:
    name: Unit Tests (Worker)
    needs: [changes, build-worker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - run: dotnet restore tests/CardiTrack.UnitTests/CardiTrack.UnitTests.csproj
      - run: |
          dotnet test tests/CardiTrack.UnitTests/CardiTrack.UnitTests.csproj \
            -c Release \
            --logger trx \
            --filter "Category=Worker"
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: worker-test-results
          path: '**/*.trx'
          retention-days: 7

  security-worker:
    name: Security Scan (Worker)
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - name: Dependency vulnerability audit
        run: |
          dotnet restore src/Worker/CardiTrack.Worker/CardiTrack.Worker.csproj
          dotnet list src/Worker/CardiTrack.Worker/CardiTrack.Worker.csproj package \
            --vulnerable --include-transitive 2>&1 | tee audit.txt
          if grep -E "^\s+> " audit.txt | grep -qv "GHSA-rvv3-g6hj-g44x"; then
            echo "::error::Vulnerable packages detected — review audit.txt"
            exit 1
          fi

  # ── Mobile ───────────────────────────────────────────────────────────────────
  build-mobile-android:
    name: Build Mobile (Android)
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - run: dotnet workload install maui-android
      - run: |
          dotnet publish src/Presentation/CardiTrack.Mobile/CardiTrack.Mobile.csproj \
            -f net10.0-android \
            -c Release
      - uses: actions/upload-artifact@v7
        with:
          name: mobile-android
          path: '**/*.apk'
          retention-days: 7

  build-mobile-ios:
    name: Build Mobile (iOS)
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - run: dotnet workload install maui-ios
      - run: |
          dotnet build src/Presentation/CardiTrack.Mobile/CardiTrack.Mobile.csproj \
            -f net10.0-ios \
            -c Release \
            -r iossimulator-x64 \
            -p:ArchiveOnBuild=false
      - name: Zip .app bundle
        run: |
          APP=$(find . -type d -name '*.app' | head -1)
          zip -r ios-app.zip "$APP"
      - uses: actions/upload-artifact@v7
        with:
          name: mobile-ios-build
          path: ios-app.zip
          retention-days: 7

  build-mobile-windows:
    name: Build Mobile (Windows)
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - run: dotnet workload install maui-windows
      - run: dotnet restore src/Presentation/CardiTrack.Mobile/CardiTrack.Mobile.csproj -p:TargetFrameworks=net10.0-windows10.0.19041.0 -r win-x64
      - run: dotnet restore src/Core/CardiTrack.Application/CardiTrack.Application.csproj
      - run: dotnet restore src/Core/CardiTrack.Domain/CardiTrack.Domain.csproj
      - run: |
          dotnet publish src/Presentation/CardiTrack.Mobile/CardiTrack.Mobile.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            --no-restore `
            -r win-x64 `
            -p:TargetFrameworks=net10.0-windows10.0.19041.0 `
            -p:PublishReadyToRun=false
      - uses: actions/upload-artifact@v7
        with:
          name: mobile-windows
          path: '**/*.msix'
          retention-days: 7

  security-mobile:
    name: Security Scan (Mobile)
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ needs.changes.outputs.dotnet_version }}
      - name: Dependency vulnerability audit
        run: |
          dotnet workload install maui-android
          dotnet restore src/Presentation/CardiTrack.Mobile/CardiTrack.Mobile.csproj -p:TargetFrameworks=net10.0-android
          dotnet list src/Presentation/CardiTrack.Mobile/CardiTrack.Mobile.csproj package \
            --vulnerable --include-transitive 2>&1 | tee audit.txt
          if grep -E "^\s+> " audit.txt | grep -qv "GHSA-rvv3-g6hj-g44x"; then
            echo "::error::Vulnerable packages detected — review audit.txt"
            exit 1
          fi

  # ── Main only: Appetize previews ────────────────────────────────────────────
  deploy-appetize-android:
    name: Deploy → Appetize (Android)
    needs:
      - changes
      - compute-version
      - build-mobile-android
      - security-mobile
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3

      # Gate only on the API token — public key is optional (bootstrapped on first run)
      - name: Fetch Appetize token
        id: token
        env:
          PROJECT: ${{ needs.changes.outputs.gcp_project_id }}
        run: |
          if ! gcloud secrets describe carditrack-appetize-api-token --project="$PROJECT" > /dev/null 2>&1; then
            echo "::warning::carditrack-appetize-api-token not found — skipping Android upload. Set the token in Secret Manager after running Deploy Infrastructure → Common."
            echo "### Appetize upload skipped (Android)" >> $GITHUB_STEP_SUMMARY
            echo "\`carditrack-appetize-api-token\` not found. Add the token to Secret Manager to enable Appetize uploads." >> $GITHUB_STEP_SUMMARY
            echo "available=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          TOKEN=$(gcloud secrets versions access latest --secret="carditrack-appetize-api-token" --project="$PROJECT")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "available=true" >> $GITHUB_OUTPUT

      - name: Fetch Android public key (if known)
        id: pubkey
        if: steps.token.outputs.available == 'true'
        env:
          PROJECT: ${{ needs.changes.outputs.gcp_project_id }}
        run: |
          KEY=$(gcloud secrets versions access latest --secret="carditrack-appetize-android-public-key" --project="$PROJECT" 2>/dev/null || true)
          if [ -z "$KEY" ] || [ "$KEY" = "REPLACE_ME" ]; then
            echo "key=" >> $GITHUB_OUTPUT
          else
            echo "::add-mask::$KEY"
            echo "key=$KEY" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v8
        if: steps.token.outputs.available == 'true'
        with:
          name: mobile-android
          path: artifacts/android

      - name: Find APK
        id: apk
        if: steps.token.outputs.available == 'true'
        run: echo "path=$(find artifacts/android -name '*.apk' | head -1)" >> $GITHUB_OUTPUT

      - uses: appetizeio/github-action-appetize@v1.0.5
        id: appetize
        if: steps.token.outputs.available == 'true'
        with:
          apiToken: ${{ steps.token.outputs.token }}
          platform: android
          appFile: ${{ steps.apk.outputs.path }}
          publicKey: ${{ steps.pubkey.outputs.key }}
          note: ${{ needs.compute-version.outputs.version }}

      # Store the returned public key when it was unknown (first upload)
      - name: Store Android public key
        if: steps.token.outputs.available == 'true' && steps.pubkey.outputs.key == ''
        env:
          PROJECT: ${{ needs.changes.outputs.gcp_project_id }}
          KEY: ${{ steps.appetize.outputs.publicKey }}
        run: |
          echo -n "$KEY" | gcloud secrets versions add carditrack-appetize-android-public-key \
            --project="$PROJECT" \
            --data-file=-
          echo "Android public key stored in Secret Manager for future runs."

  deploy-appetize-ios:
    name: Deploy → Appetize (iOS)
    needs:
      - changes
      - compute-version
      - build-mobile-ios
      - security-mobile
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3

      # Gate only on the API token — public key is optional (bootstrapped on first run)
      - name: Fetch Appetize token
        id: token
        env:
          PROJECT: ${{ needs.changes.outputs.gcp_project_id }}
        run: |
          if ! gcloud secrets describe carditrack-appetize-api-token --project="$PROJECT" > /dev/null 2>&1; then
            echo "::warning::carditrack-appetize-api-token not found — skipping iOS upload. Set the token in Secret Manager after running Deploy Infrastructure → Common."
            echo "### Appetize upload skipped (iOS)" >> $GITHUB_STEP_SUMMARY
            echo "\`carditrack-appetize-api-token\` not found. Add the token to Secret Manager to enable Appetize uploads." >> $GITHUB_STEP_SUMMARY
            echo "available=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          TOKEN=$(gcloud secrets versions access latest --secret="carditrack-appetize-api-token" --project="$PROJECT")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "available=true" >> $GITHUB_OUTPUT

      - name: Fetch iOS public key (if known)
        id: pubkey
        if: steps.token.outputs.available == 'true'
        env:
          PROJECT: ${{ needs.changes.outputs.gcp_project_id }}
        run: |
          KEY=$(gcloud secrets versions access latest --secret="carditrack-appetize-ios-public-key" --project="$PROJECT" 2>/dev/null || true)
          if [ -z "$KEY" ] || [ "$KEY" = "REPLACE_ME" ]; then
            echo "key=" >> $GITHUB_OUTPUT
          else
            echo "::add-mask::$KEY"
            echo "key=$KEY" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v8
        if: steps.token.outputs.available == 'true'
        with:
          name: mobile-ios-build
          path: artifacts/ios

      - uses: appetizeio/github-action-appetize@v1.0.5
        id: appetize
        if: steps.token.outputs.available == 'true'
        with:
          apiToken: ${{ steps.token.outputs.token }}
          platform: ios
          appFile: artifacts/ios/ios-app.zip
          fileType: zip
          publicKey: ${{ steps.pubkey.outputs.key }}
          note: ${{ needs.compute-version.outputs.version }}

      # Store the returned public key when it was unknown (first upload)
      - name: Store iOS public key
        if: steps.token.outputs.available == 'true' && steps.pubkey.outputs.key == ''
        env:
          PROJECT: ${{ needs.changes.outputs.gcp_project_id }}
          KEY: ${{ steps.appetize.outputs.publicKey }}
        run: |
          echo -n "$KEY" | gcloud secrets versions add carditrack-appetize-ios-public-key \
            --project="$PROJECT" \
            --data-file=-
          echo "iOS public key stored in Secret Manager for future runs."

  # ── Main only: Push images ───────────────────────────────────────────────────
  push-api-image:
    name: Push API Image
    needs:
      - changes
      - compute-version
      - build-api
      - test-unit
      - test-integration
      - security-api
      - check-migrations
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker ${{ needs.changes.outputs.gcp_region }}-docker.pkg.dev --quiet
      - name: Build and push
        id: push
        env:
          IMAGE: ${{ needs.changes.outputs.registry }}/api
          TAG: ${{ needs.compute-version.outputs.version }}
        run: |
          docker build -f src/Presentation/CardiTrack.API/Dockerfile \
            -t $IMAGE:$TAG \
            .
          docker push $IMAGE:$TAG
          echo "image=$IMAGE:$TAG" >> $GITHUB_OUTPUT

  push-migrator-image:
    name: Push Migrator Image
    needs:
      - changes
      - compute-version
      - build-api
      - test-unit
      - test-integration
      - security-api
      - check-migrations
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker ${{ needs.changes.outputs.gcp_region }}-docker.pkg.dev --quiet
      - name: Build and push
        id: push
        env:
          IMAGE: ${{ needs.changes.outputs.registry }}/migrator
          TAG: ${{ needs.compute-version.outputs.version }}
        run: |
          docker build -f src/Presentation/CardiTrack.API/Dockerfile.migrate \
            -t $IMAGE:$TAG \
            .
          docker push $IMAGE:$TAG
          echo "image=$IMAGE:$TAG" >> $GITHUB_OUTPUT

  push-web-image:
    name: Push Web Image
    needs:
      - changes
      - compute-version
      - build-web
      - security-web
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker ${{ needs.changes.outputs.gcp_region }}-docker.pkg.dev --quiet
      - name: Build and push
        id: push
        env:
          IMAGE: ${{ needs.changes.outputs.registry }}/web
          TAG: ${{ needs.compute-version.outputs.version }}
        run: |
          docker build -f src/Presentation/CardiTrack.Web/Dockerfile \
            -t $IMAGE:$TAG \
            .
          docker push $IMAGE:$TAG
          echo "image=$IMAGE:$TAG" >> $GITHUB_OUTPUT

  push-worker-image:
    name: Push Worker Image
    needs:
      - changes
      - compute-version
      - build-worker
      - test-unit-worker
      - security-worker
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker ${{ needs.changes.outputs.gcp_region }}-docker.pkg.dev --quiet
      - name: Build and push
        id: push
        env:
          IMAGE: ${{ needs.changes.outputs.registry }}/worker
          TAG: ${{ needs.compute-version.outputs.version }}
        run: |
          docker build -f src/Worker/CardiTrack.Worker/Dockerfile \
            -t $IMAGE:$TAG \
            .
          docker push $IMAGE:$TAG
          echo "image=$IMAGE:$TAG" >> $GITHUB_OUTPUT

  upload-mobile-artifacts:
    name: Upload Mobile Artifacts to GCS
    needs:
      - changes
      - compute-version
      - build-mobile-android
      - build-mobile-ios
      - build-mobile-windows
      - security-mobile
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - uses: actions/download-artifact@v8
        with:
          name: mobile-android
          path: artifacts/android
      - uses: actions/download-artifact@v8
        with:
          name: mobile-ios-build
          path: artifacts/ios
      - uses: actions/download-artifact@v8
        with:
          name: mobile-windows
          path: artifacts/windows
      - name: Upload to GCS
        env:
          TAG: ${{ needs.compute-version.outputs.version }}
          BUCKET: gs://${{ needs.changes.outputs.gcs_builds_bucket }}
        run: |
          gcloud storage cp -r artifacts/android/** $BUCKET/$TAG/android/
          gcloud storage cp -r artifacts/ios/**     $BUCKET/$TAG/ios/
          gcloud storage cp -r artifacts/windows/** $BUCKET/$TAG/windows/

  # ── Main only: DB Migrations + Deploy Dev ───────────────────────────────────
  run-db-migrations:
    name: DB Migrations (Dev)
    needs: [changes, push-migrator-image]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Update migrator job image
        env:
          JOB: carditrack-dev-api-migrator
          IMAGE: ${{ needs.push-migrator-image.outputs.image }}
          REGION: ${{ needs.changes.outputs.gcp_region }}
          PROJECT: ${{ needs.changes.outputs.gcp_project_id }}
        run: |
          gcloud run jobs update $JOB \
            --image $IMAGE \
            --region $REGION \
            --project $PROJECT \
            --quiet
      - name: Execute migrations
        env:
          JOB: carditrack-dev-api-migrator
          REGION: ${{ needs.changes.outputs.gcp_region }}
          PROJECT: ${{ needs.changes.outputs.gcp_project_id }}
        run: |
          gcloud run jobs execute $JOB \
            --wait \
            --region $REGION \
            --project $PROJECT

  deploy-api-dev:
    name: Deploy API → Dev
    needs: [changes, push-api-image, run-db-migrations]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Deploy
        run: |
          gcloud run deploy carditrack-dev-api \
            --image ${{ needs.push-api-image.outputs.image }} \
            --region ${{ needs.changes.outputs.gcp_region }} \
            --project ${{ needs.changes.outputs.gcp_project_id }} \
            --add-cloudsql-instances carditrack-490120:europe-west2:carditrack-dev-sql \
            --quiet
      - name: Smoke test
        env:
          SECRET_ID: carditrack-dev-health-token
          PROJECT: ${{ needs.changes.outputs.gcp_project_id }}
        run: |
          HEALTH_TOKEN=$(gcloud secrets versions access latest \
            --secret="$SECRET_ID" \
            --project="$PROJECT")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-Health-Token: $HEALTH_TOKEN" \
            -A "carditrack-healthcheck" \
            "${{ needs.changes.outputs.api_url_dev }}/health")
          [ "$STATUS" = "200" ] || (echo "::error::Health check failed: HTTP $STATUS" && exit 1)

  deploy-web-dev:
    name: Deploy Web → Dev
    needs: [changes, push-web-image]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: |
          gcloud run deploy carditrack-dev-web \
            --image ${{ needs.push-web-image.outputs.image }} \
            --region ${{ needs.changes.outputs.gcp_region }} \
            --project ${{ needs.changes.outputs.gcp_project_id }} \
            --quiet

  deploy-worker-dev:
    name: Deploy Worker → Dev
    needs: [changes, push-worker-image]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: |
          gcloud run deploy carditrack-dev-worker \
            --image ${{ needs.push-worker-image.outputs.image }} \
            --region ${{ needs.changes.outputs.gcp_region }} \
            --project ${{ needs.changes.outputs.gcp_project_id }} \
            --add-cloudsql-instances carditrack-490120:europe-west2:carditrack-dev-sql \
            --quiet

  # ── MedGemma ─────────────────────────────────────────────────────────────────
  build-and-push-medgemma:
    name: Build & Push MedGemma Image
    needs: [changes, compute-version]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.medgemma == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker ${{ needs.changes.outputs.gcp_region }}-docker.pkg.dev --quiet
      - name: Read model version
        id: model
        run: echo "tag=$(cat src/Infrastructure/MedGemma/.model-version | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Build and push
        env:
          IMAGE: ${{ needs.changes.outputs.registry }}/medgemma
          TAG: ${{ needs.compute-version.outputs.version }}
        run: |
          docker build \
            --build-arg MODEL_TAG=${{ steps.model.outputs.tag }} \
            -t $IMAGE:$TAG \
            -f src/Infrastructure/MedGemma/Dockerfile .
          docker push $IMAGE:$TAG
          docker tag $IMAGE:$TAG $IMAGE:stable
          docker push $IMAGE:stable
          echo "image=$IMAGE:$TAG" >> $GITHUB_OUTPUT
        id: push
      - name: Resolve image
        id: resolve
        env:
          IMAGE: ${{ needs.changes.outputs.registry }}/medgemma
        run: echo "image=$IMAGE:${{ needs.compute-version.outputs.version }}" >> $GITHUB_OUTPUT

  deploy-medgemma-dev:
    name: Deploy MedGemma → Dev
    needs: [changes, build-and-push-medgemma]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.changes.outputs.medgemma == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.changes.outputs.gcp_wif_provider }}
          service_account: ${{ needs.changes.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Deploy MedGemma service
        env:
          SERVICE: carditrack-dev-medgemma
          IMAGE: ${{ needs.build-and-push-medgemma.outputs.image }}
          REGION: ${{ needs.changes.outputs.gcp_region }}
          PROJECT: ${{ needs.changes.outputs.gcp_project_id }}
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE \
            --region $REGION \
            --project $PROJECT \
            --quiet
      - name: Update MedGemma URL secret
        env:
          SERVICE: carditrack-dev-medgemma
          SECRET_ID: carditrack-dev-medgemma-service-url
          REGION: ${{ needs.changes.outputs.gcp_region }}
          PROJECT: ${{ needs.changes.outputs.gcp_project_id }}
        run: |
          URL=$(gcloud run services describe $SERVICE \
            --region $REGION \
            --project $PROJECT \
            --format='value(status.url)')
          echo -n "$URL" | gcloud secrets versions add $SECRET_ID \
            --data-file=- \
            --project $PROJECT

  # ── Main only: Create patch tag ──────────────────────────────────────────────
  patch-tag:
    name: Create Patch Tag
    needs:
      - changes
      - compute-version
      - deploy-api-dev
      - deploy-web-dev
      - deploy-worker-dev
      - deploy-medgemma-dev
      - upload-mobile-artifacts
      - deploy-appetize-android
      - deploy-appetize-ios
    permissions:
      contents: write
    if: |
      always() &&
      github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Push tag
        env:
          TAG: ${{ needs.compute-version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $TAG
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git $TAG
          echo "### Tagged: \`$TAG\`" >> $GITHUB_STEP_SUMMARY
