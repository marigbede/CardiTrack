name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [minor, major]
      notes:
        description: 'Release notes (optional)'
        required: false
        type: string

jobs:
  bump:
    name: Bump ${{ inputs.bump }} version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-version:refname | grep '^v[0-9]' | head -1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
          MAJOR=$(echo ${LATEST#v} | cut -d. -f1)
          MINOR=$(echo ${LATEST#v} | cut -d. -f2)

          if [ "${{ inputs.bump }}" = "minor" ]; then
            NEXT="v${MAJOR}.$((MINOR+1)).0"
          elif [ "${{ inputs.bump }}" = "major" ]; then
            NEXT="v$((MAJOR+1)).0.0"
          fi

          echo "current=${LATEST}" >> $GITHUB_OUTPUT
          echo "next=${NEXT}" >> $GITHUB_OUTPUT
          echo "Current: ${LATEST} → Next: ${NEXT}"

      - name: Create and push tag
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEXT
          git push origin $NEXT

      - name: Create GitHub Release draft
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.next }}';
            const prev = '${{ steps.version.outputs.current }}';
            const notes = `${{ inputs.notes }}`;

            const { data: commits } = await github.rest.repos.compareCommitsWithBasehead({
              owner: context.repo.owner,
              repo: context.repo.repo,
              basehead: `${prev}...HEAD`
            });

            const changelog = commits.commits
              .map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.slice(0,7)})`)
              .join('\n');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: [
                notes ? `## Notes\n${notes}\n` : '',
                `## Changes since ${prev}\n${changelog}`
              ].filter(Boolean).join('\n'),
              draft: true,
              prerelease: false
            });

            core.summary.addRaw(`### Release draft created: \`${tag}\``);
            await core.summary.write();
