name: Deploy Infrastructure → Common

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-infra-common.yml'
      - 'infrastructure/common/**'
      - 'infrastructure/environments/common.tfvars'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'infrastructure/common/**'
      - 'infrastructure/environments/common.tfvars'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-common-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Shared config ────────────────────────────────────────────────────────────
  env:
    uses: ./.github/workflows/_env.yml

  validate:
    name: Validate
    needs: env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ needs.env.outputs.tf_version }}
      - name: terraform fmt
        working-directory: ${{ needs.env.outputs.tf_working_dir_common }}
        run: terraform fmt -check -recursive
      - name: terraform init (no backend)
        working-directory: ${{ needs.env.outputs.tf_working_dir_common }}
        run: terraform init -backend=false
      - name: terraform validate
        working-directory: ${{ needs.env.outputs.tf_working_dir_common }}
        run: terraform validate

  bootstrap-state-bucket:
    name: Bootstrap State Bucket
    needs: [env, validate]
    runs-on: ubuntu-latest
    outputs:
      bucket: ${{ steps.ensure.outputs.bucket }}
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.env.outputs.gcp_wif_provider }}
          service_account: ${{ needs.env.outputs.gcp_service_account }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Ensure state bucket exists
        id: ensure
        env:
          BUCKET: ${{ needs.env.outputs.tf_state_bucket_common }}
          PROJECT: ${{ needs.env.outputs.gcp_project_id }}
          REGION: ${{ needs.env.outputs.gcp_region }}
        run: |
          if gcloud storage buckets describe gs://$BUCKET --project=$PROJECT > /dev/null 2>&1; then
            echo "Bucket gs://$BUCKET already exists"
          else
            echo "Bucket gs://$BUCKET not found — creating..."
            gcloud storage buckets create gs://$BUCKET \
              --project=$PROJECT \
              --location=$REGION \
              --uniform-bucket-level-access
            gcloud storage buckets update gs://$BUCKET --versioning
            echo "Bucket gs://$BUCKET created with versioning enabled"
          fi
          echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT

  plan:
    name: Plan — ${{ matrix.tf_version }}
    needs: [env, validate, bootstrap-state-bucket]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tf_version:
          - ${{ needs.env.outputs.tf_version }}
          - latest
      fail-fast: false
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v3
        if: matrix.tf_version == needs.env.outputs.tf_version
        with:
          workload_identity_provider: ${{ needs.env.outputs.gcp_wif_provider }}
          service_account: ${{ needs.env.outputs.gcp_service_account }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ matrix.tf_version }}
      - name: terraform init (pinned)
        if: matrix.tf_version == needs.env.outputs.tf_version
        working-directory: ${{ needs.env.outputs.tf_working_dir_common }}
        run: |
          terraform init \
            -backend-config="bucket=${{ needs.env.outputs.tf_state_bucket_common }}" \
            -backend-config="prefix=carditrack/common"
      - name: terraform init (latest, no backend)
        if: matrix.tf_version != needs.env.outputs.tf_version
        working-directory: ${{ needs.env.outputs.tf_working_dir_common }}
        run: terraform init -backend=false
      - name: terraform plan (pinned)
        if: matrix.tf_version == needs.env.outputs.tf_version
        id: plan-pinned
        working-directory: ${{ needs.env.outputs.tf_working_dir_common }}
        run: |
          set +e
          terraform plan \
            -var-file=../environments/common.tfvars \
            -out=common.tfplan \
            -detailed-exitcode \
            -no-color 2>&1 | tee plan.txt
          TF_EXIT=${PIPESTATUS[0]}
          echo "exitcode=${TF_EXIT}" >> $GITHUB_OUTPUT
          [ $TF_EXIT -eq 1 ] && exit 1 || exit 0
      - name: terraform validate (latest)
        if: matrix.tf_version != needs.env.outputs.tf_version
        working-directory: ${{ needs.env.outputs.tf_working_dir_common }}
        run: terraform validate -no-color 2>&1 | tee plan.txt
      - name: Save plan artifact
        if: matrix.tf_version == needs.env.outputs.tf_version
        uses: actions/upload-artifact@v7
        with:
          name: common-tfplan
          path: ${{ needs.env.outputs.tf_working_dir_common }}/common.tfplan
          retention-days: 1
      - name: Plan summary
        run: |
          echo "### Terraform Plan — Common (${{ matrix.tf_version }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat ${{ needs.env.outputs.tf_working_dir_common }}/plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Post plan to PR
        if: github.event_name == 'pull_request' && matrix.tf_version == needs.env.outputs.tf_version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ needs.env.outputs.tf_working_dir_common }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n\n... (truncated)' : plan;
            const body = `### Terraform Plan — Common (${{ needs.env.outputs.tf_version }})\n\`\`\`hcl\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  apply:
    name: Apply (Common)
    needs: [env, plan]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ needs.env.outputs.gcp_wif_provider }}
          service_account: ${{ needs.env.outputs.gcp_service_account }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ needs.env.outputs.tf_version }}
      - name: terraform init
        working-directory: ${{ needs.env.outputs.tf_working_dir_common }}
        run: |
          terraform init \
            -backend-config="bucket=${{ needs.env.outputs.tf_state_bucket_common }}" \
            -backend-config="prefix=carditrack/common"
      - uses: actions/download-artifact@v8
        with:
          name: common-tfplan
          path: ${{ needs.env.outputs.tf_working_dir_common }}
      - name: terraform apply
        working-directory: ${{ needs.env.outputs.tf_working_dir_common }}
        run: terraform apply common.tfplan
      - name: Output summary
        working-directory: ${{ needs.env.outputs.tf_working_dir_common }}
        run: |
          echo "### Terraform Applied — Common" >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY
