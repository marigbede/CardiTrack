version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: src/Presentation/CardiTrack.API/Dockerfile
    image: carditrack-api:chiseled
    container_name: carditrack-api
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CardiTrack;User Id=sa;Password=YourStrong@Passw0rd123;TrustServerCertificate=True;Encrypt=False
      - ConnectionStrings__Redis=redis:6379
      - Auth0__Domain=${AUTH0_DOMAIN:-YOUR_AUTH0_DOMAIN.us.auth0.com}
      - Auth0__Audience=${AUTH0_AUDIENCE:-https://api.carditrack.com}
      - Auth0__ClientId=${AUTH0_CLIENT_ID:-YOUR_CLIENT_ID}
      - Auth0__ClientSecret=${AUTH0_CLIENT_SECRET:-YOUR_CLIENT_SECRET}
      - Serilog__SeqUrl=http://seq:80
      - DOTNET_EnableDiagnostics=0
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - carditrack-network
    volumes:
      - ./logs:/app/logs
    # Security hardening for chiseled container
    user: "1654:1654"  # Run as non-root user 'app'
    read_only: true    # Read-only filesystem
    tmpfs:
      - /tmp           # Temporary files
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]  # Basic health check (no curl in chiseled)
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - carditrack-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd123 -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - carditrack-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data
    networks:
      - carditrack-network

volumes:
  sqlserver-data:
  redis-data:
  seq-data:

networks:
  carditrack-network:
    driver: bridge
